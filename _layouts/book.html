---
layout: default
---

<div id="main" role="main">
  <article class="book">
    <header class="book__header">
      <h1 class="book__title">{{ page.title }}</h1>
      <p class="book__author"><strong>Author:</strong> {{ page.author }}</p>
      <p class="book__date"><strong>Finished Reading:</strong> {{ page.date | date: "%B %d, %Y" }}</p>
    </header>
    <div class="book__content">
      {{ content }}
    </div>
  </article>
</div>
